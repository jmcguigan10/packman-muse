[workspace]
name = "muse-local-stack"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.11,<3.13"
pandas = ">=2,<3"
pyarrow = ">=18,<23"
bash = ">=5,<6"
coreutils = ">=9,<10"
findutils = ">=4,<5"
gawk = ">=5,<6"
sed = ">=4,<5"
grep = ">=3,<4"
curl = ">=8,<9"
tar = ">=1.34,<2"
gzip = ">=1.13,<2"
openssh = ">=9,<11"
root = "6.36.10.*"
git = ">=2.54.0,<3"
cmake = ">=4.3.3,<5"
ninja = ">=1.13.2,<2"
make = ">=4.4.1,<5"
pkg-config = ">=0.29.2,<0.30"
gnuconfig = ">=2025.7.9,<2026"
libboost-devel = ">=1.91,<2"
liblzma-devel = ">=5.8,<6"
expat = ">=2.8.1,<3"
ftgl = ">=2.4.0,<3"
gsl = ">=2.7,<3"
xerces-c = ">=3.3.0,<4"
openssl = ">=3,<4"
eigen = ">=3,<4"
ruby = ">=3,<4"

[target.osx-arm64.dependencies]
c-compiler = "*"
cxx-compiler = "*"

[feature.mpi.dependencies]
openmpi = "*"

[feature.legacy-graphics.dependencies]
ftgl = "*"

[environments]
batch = { features = [] }
mpi = { features = ["mpi"] }
legacy-graphics = { features = ["legacy-graphics"] }
full = { features = ["mpi", "legacy-graphics"] }

[tasks]
help = "bash scripts/help.sh"
probe-host = "bash scripts/probe-host.sh"
init-prefix = "mkdir -p .install/src .install/build .install/state .install/logs .local/bin"
stack-shell = "bash scripts/stack-shell.sh"

build-xqilla = { cmd = "bash scripts/build-xqilla.sh", depends-on = ["probe-host", "init-prefix"] }
probe-xqilla = { cmd = "bash scripts/probe-xqilla.sh", depends-on = ["build-xqilla"] }

build-clhep = { cmd = "bash scripts/build-clhep.sh", depends-on = ["probe-host", "init-prefix"] }
build-geant4 = { cmd = "bash scripts/build-geant4.sh", depends-on = ["build-clhep"] }

build-genfit = { cmd = "bash scripts/build-genfit.sh", depends-on = ["probe-host", "init-prefix"] }

build-muse = { cmd = "bash scripts/build-muse.sh", depends-on = ["probe-xqilla", "build-geant4", "build-genfit"] }
ccmake-muse = { cmd = "bash scripts/ccmake-muse.sh", depends-on = ["probe-xqilla", "build-geant4", "build-genfit"] }
install-configured-muse = "bash scripts/install-configured-muse.sh"

build-stack = { depends-on = ["build-muse"] }

clean-local = "rm -rf .install .local/bin/xqilla .local/bin/clhep .local/bin/geant4 .local/bin/genfit .local/bin/muse .local/bin/shared"
