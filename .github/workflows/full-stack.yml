name: Full stack build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  full-stack:
    name: Full stack
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-14
          - os: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH for private MUSE repos
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MUSE_DEPLOY_KEY }}

      - name: Trust GitHub SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Cache Pixi and source downloads
        uses: actions/cache@v4
        with:
          path: |
            .local/bin/pixi
            .local/pixi-home
            .local/pixi-cache
            .pixi
            .install/src
          key: ${{ runner.os }}-${{ runner.arch }}-full-stack-${{ hashFiles('pixi.toml', 'pixi.lock', 'configs/*.sh', 'scripts/*.sh', 'scripts/**/*.sh', 'scripts/python/*.py', 'scripts/pixi-local', 'scripts/pixi-local.in') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-full-stack-

      - name: Bootstrap and install
        run: |
          bash scripts/bootstrap-pixi.sh
          ./scripts/pixi-local install

      - name: Build full stack
        run: ./scripts/pixi-local run -e batch build-stack

      - name: Probe final environment
        run: |
          ./scripts/pixi-local run -e batch probe-host
          ./scripts/pixi-local run -e batch probe-xqilla

      - name: Runtime dependency audit
        shell: bash
        run: ./scripts/pixi-local run -e batch python scripts/python/audit_runtime_deps.py

  wsl-full-stack:
    name: WSL full stack
    runs-on: windows-2022
    timeout-minutes: 420

    defaults:
      run:
        shell: wsl-bash {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up WSL2 Ubuntu
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-24.04
          wsl-version: 2
          additional-packages: |
            ca-certificates
            curl
            git
            gzip
            openssh-client
            tar

      - name: Copy checkout into WSL filesystem
        run: |
          case "$GITHUB_WORKSPACE" in
            [A-Za-z]:* | *\\*) src="$(wslpath -u "$GITHUB_WORKSPACE")" ;;
            *) src="$GITHUB_WORKSPACE" ;;
          esac
          dst="$HOME/fpb-edits-ci"
          rm -rf "$dst"
          mkdir -p "$dst"
          tar -C "$src" \
            --exclude=.git \
            --exclude=.install \
            --exclude=.local \
            --exclude=.pixi \
            -cf - . | tar -C "$dst" -xf -

      - name: Configure SSH for private MUSE repos
        env:
          MUSE_DEPLOY_KEY: ${{ secrets.MUSE_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$MUSE_DEPLOY_KEY" >~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >>~/.ssh/known_hosts

      - name: Bootstrap and install
        run: |
          cd "$HOME/fpb-edits-ci"
          bash scripts/bootstrap-pixi.sh
          ./scripts/pixi-local install

      - name: Build full stack
        run: |
          cd "$HOME/fpb-edits-ci"
          ./scripts/pixi-local run -e batch build-stack

      - name: Probe final environment
        run: |
          cd "$HOME/fpb-edits-ci"
          ./scripts/pixi-local run -e batch probe-host
          ./scripts/pixi-local run -e batch probe-xqilla

      - name: Runtime dependency audit
        run: |
          cd "$HOME/fpb-edits-ci"
          ./scripts/pixi-local run -e batch python scripts/python/audit_runtime_deps.py
