components = ["xqilla", "clhep", "geant4", "genfit", "muse"]

build_type = "Release"
cxx_standard = 20
jobs = "auto"

source_dir = ".install/src"
build_dir = ".install/build"
state_dir = ".install/state"
install_dir = ".local/bin"

[prefix]
xqilla = "bin/xqilla"
clhep = "bin/clhep"
geant4 = "bin/geant4"
genfit = "bin/genfit"
muse = "bin/muse"

[source.xqilla]
kind = "tar"
url = "https://sourceforge.net/projects/xqilla/files/XQilla-2.3.4.tar.gz/download"
version = "2.3.4"
root = "XQilla-2.3.4"
tarball = "XQilla-2.3.4.tar.gz"
sha256 = "292631791631fe2e7eb9727377335063a48f12611d641d0296697e0c075902eb"

[build.xqilla]
type = "configure"
autotools_dir = "autotools"
cppflags = "-I{env_root}/include"
ldflags = "-L{env_root}/lib -Wl,-rpath,{env_root}/lib"
cflags = "-O2"
cxxflags = "-O2 -std=gnu++14"
configure_args = ["--with-xerces={env_root}"]

[source.clhep]
kind = "git"
url = "https://gitlab.cern.ch/CLHEP/CLHEP.git"
ref = "CLHEP_2_4_7_2"
sha = "10fdf9b342265174b37db3bcb9a1fc79e585fde7"

[build.clhep]
type = "cmake"
cmake_args = [
    "-DCLHEP_BUILD_CXXSTD=-std=c++{cxx_standard}",
    "-DCLHEP_BUILD_STATIC_LIBS=OFF",
]

[source.geant4]
kind = "tar"
url = "https://gitlab.cern.ch/geant4/geant4/-/archive/v11.4.1/geant4-v11.4.1.tar.gz"
version = "11.4.1"
root = "geant4-v11.4.1"
tarball = "geant4-v11.4.1.tar.gz"
sha256 = "99dcf5f9d4f806fb8c4fde85cb2674a42e4ca19833143464ff7efa55c1852140"

[build.geant4]
type = "cmake"
cmake_args = [
    "-DGEANT4_BUILD_MULTITHREADED=ON",
    "-DGEANT4_INSTALL_DATA=ON",
    "-DGEANT4_USE_GDML=ON",
    "-DGEANT4_USE_SYSTEM_CLHEP=ON",
    "-DGEANT4_USE_SYSTEM_EXPAT=ON",
    "-DGEANT4_USE_QT=OFF",
    "-DGEANT4_USE_OPENGL_X11=OFF",
    "-DGEANT4_USE_RAYTRACER_X11=OFF",
    "-DCLHEP_DIR={clhep_cmake_dir}",
    "-DCLHEP_ROOT_DIR={prefix.clhep}",
    "-DXercesC_ROOT={env_root}",
    "-DXERCESC_ROOT_DIR={env_root}",
]

[source.genfit]
kind = "git"
url = "git@github.com:MUSE-EXP/Genfit.git"
ref = "master"
sha = "56e733ff1eacf76b9f2cf046bb424c228ab57129"

[build.genfit]
type = "cmake"
cmake_args = [
    "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
    "-DBUILD_TESTING=OFF",
    "-DROOT_DIR={root_cmake_dir}",
]

[source.muse]
kind = "git"
url = "git@github.com:jmcguigan10/muse.git"
ref = "impl/events-level-scatter"
sha = "bffdd1b3286d9f5fb5844b14057e157343955f3d"

[build.muse]
type = "cmake"
cmake_args = [
    "-DCMAKE_INSTALL_RPATH={prefix.xqilla}/lib;{prefix.clhep}/lib;{prefix.geant4}/lib;{prefix.genfit}/lib;{prefix.muse}/lib",
    "-DCMAKE_INSTALL_RPATH_USE_LINK_PATH=OFF",
    "-DCMAKE_FIND_USE_PACKAGE_REGISTRY=FALSE",
    "-DCMAKE_FIND_USE_SYSTEM_PACKAGE_REGISTRY=FALSE",
    "-DCMAKE_FIND_USE_SYSTEM_ENVIRONMENT_PATH=FALSE",
    "-DCMAKE_IGNORE_PREFIX_PATH=/opt/homebrew;/usr/local;{home}/.muse",
    "-DCMAKE_SYSTEM_IGNORE_PREFIX_PATH=/opt/homebrew;/usr/local;{home}/.muse",
    "-DCMAKE_SHARED_PREFIX={install_dir}/shared",
    "-DCMAKE_CXX_FLAGS=-I{prefix.clhep}/include -I{env_root}/include",
    "-DROOT_CONFIG_EXECUTABLE={env_root}/bin/root-config",
    "-DROOT_INCLUDE_DIR={env_root}/include",
    "-DROOT_LIBRARY_DIR={env_root}/lib",
    "-DCLHEP_CONFIG_EXECUTABLE={prefix.clhep}/bin/clhep-config",
    "-DGSL_CONFIG={env_root}/bin/gsl-config",
    "-DXQILLA_INCLUDE_DIR={prefix.xqilla}/include",
    "-DXQILLA_LIBRARY_DIR={prefix.xqilla}/lib",
    "-DXQILLA_LIBRARY={xqilla_library}",
    "-DXercesC_ROOT={env_root}",
    "-DXERCESC_ROOT_DIR={env_root}",
    "-DLZMA_BASE_DIR={env_root}",
    "-DLZMA_INCLUDE_DIR={env_root}/include",
    "-DLZMA_LIBRARIES={lzma_library}",
    "-DOPENSSL_BASE_DIR={env_root}",
    "-DOPENSSL_ROOT_DIR={env_root}",
    "-DOPENSSL_INCLUDE_DIR={env_root}/include",
    "-DOPENSSL_SSL_LIBRARY={openssl_ssl_library}",
    "-DOPENSSL_CRYPTO_LIBRARY={openssl_crypto_library}",
    "-DOPENSSL_LIBRARIES={openssl_libraries}",
    "-DGeant4_DIR={prefix.geant4}/lib/cmake/Geant4",
    "-DDo_G4PSI=ON",
    "-DDO_RADGEN=ON",
    "-DDO_TIMEWALK=ON",
    "-DDO_ML=OFF",
    "-DDo_Tracking=OFF",
]

[dependencies]
python = ">=3.11,<3.13"
bash = ">=5,<6"
coreutils = ">=9,<10"
findutils = ">=4,<5"
gawk = ">=5,<6"
sed = ">=4,<5"
grep = ">=3,<4"
curl = ">=8,<9"
tar = ">=1.34,<2"
gzip = ">=1.13,<2"
openssh = ">=9,<11"
root = "6.36.10.*"
git = ">=2.54.0,<3"
cmake = ">=4.3.3,<5"
ninja = ">=1.13.2,<2"
make = ">=4.4.1,<5"
pkg-config = ">=0.29.2,<0.30"
gnuconfig = ">=2025.7.9,<2026"
libboost-devel = ">=1.91,<2"
liblzma-devel = ">=5.8,<6"
expat = ">=2.8.1,<3"
ftgl = ">=2.4.0,<3"
gsl = ">=2.7,<3"
xerces-c = ">=3.3.0,<4"
openssl = ">=3,<4"
eigen = ">=3,<4"
ruby = ">=3,<4"

[target.linux-64.dependencies]
c-compiler = "*"
cxx-compiler = "*"

[target.linux-aarch64.dependencies]
c-compiler = "*"
cxx-compiler = "*"

[target.osx-64.dependencies]
c-compiler = "*"
cxx-compiler = "*"

[target.osx-arm64.dependencies]
c-compiler = "*"
cxx-compiler = "*"
